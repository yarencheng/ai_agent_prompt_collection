baseURL = "https://ai-prompt.devops-playground.dev/"
title = "AI Prompt Collection"

# Language settings
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    title = "AI Prompt Collection"
    description = "A curated collection of AI agent prompts and configurations."
    languageName = "English"
    contentDir = "content/en"
    weight = 1

# Highlighting config
pygmentsCodeFences = true
pygmentsUseClasses = false

[module]
[module.hugoVersion]
extended = true
min = "0.146.0"
[[module.imports]]
path = "github.com/google/docsy"
disable = false
[[module.imports]]
path = "github.com/google/docsy/dependencies"
disable = false

[params]
copyright = "AI Prompt Collection Authors"
github_repo = "https://github.com/yarencheng/ai_agent_prompt_collection"

[params.ui]
#  Set to false if you don't want any menus in the footer
footer_menu_title = "AI Prompt Collection"
# Enable dark mode toggle
color_palette_toggle = true
